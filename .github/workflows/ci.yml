name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      - name: Check wasm target
        run: cargo check --target wasm32-unknown-unknown

  web:
    runs-on: ubuntu-latest
    env:
      DIOXUS_BIN_DIR: ${{ runner.temp }}/dioxus-cli/bin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked --version 0.7.6 --root "${{ runner.temp }}/dioxus-cli"

      - name: Verify Dioxus CLI
        run: $DIOXUS_BIN_DIR/dx --version

      - name: Test web protocol crate
        run: cargo test --manifest-path apps/web-protocol/Cargo.toml

      - name: Test web crate
        run: cargo test --manifest-path apps/web/Cargo.toml

      - name: Check web worker crate
        run: cargo check --manifest-path apps/web-worker/Cargo.toml --target wasm32-unknown-unknown

      - name: Build production web app
        working-directory: apps/web
        run: $DIOXUS_BIN_DIR/dx build --platform web --release --debug-symbols false

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --all-features --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          use_oidc: true
