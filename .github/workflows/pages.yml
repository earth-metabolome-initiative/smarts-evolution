name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-binstall
        uses: taiki-e/install-action@cargo-binstall

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli@0.7.6 --no-confirm

      - name: Verify Dioxus CLI
        run: ~/.cargo/bin/dx --version

      - name: Build production web app
        working-directory: apps/web
        run: ~/.cargo/bin/dx build --platform web --release --debug-symbols false

      - name: Prepare Pages artifact
        run: touch apps/web/target/dx/smarts-evolution-web/release/web/public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/target/dx/smarts-evolution-web/release/web/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://smartsevo.earthmetabolome.org

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
