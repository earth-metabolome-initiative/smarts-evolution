[package]
name = "smarts-evolution"
version = "0.1.0"
edition = "2024"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[dependencies]
rdkit = { git = "https://github.com/rdkit-rs/rdkit" }
rdkit-sys = { git = "https://github.com/rdkit-rs/rdkit", features = ["dynamic-linking-from-conda"] }
cxx = "1"
genevo = "0.7"
geometric-traits = { git = "https://github.com/earth-metabolome-initiative/geometric-traits", features = ["std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
zstd = "0.13"
flate2 = "1"
rand = "0.8"
clap = { version = "4", features = ["derive"] }
log = "0.4"
env_logger = "0.11"
thiserror = "2"
indicatif = "0.17"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "rustls-tls"] }
tokio = { version = "1", features = ["rt-multi-thread"] }
uuid = { version = "1", features = ["v4"] }
zenodo-rs = { version = "0.1.2", features = ["checksums"] }

[build-dependencies]
cxx-build = "1"

[dev-dependencies]
axum = "0.8"
tokio = { version = "1", features = ["net", "rt-multi-thread"] }

[lints.clippy]
all = { level = "warn", priority = -1 }
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
expect_used = "warn"
panic = "warn"
